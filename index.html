<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>World Cup Knockout Simulator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.jpg">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body.light { background: #f0f0f0; color: #222; }
        header, footer {
            padding: 0.6rem 1rem;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        body.light header, body.light footer { background: #ddd; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        .header-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .header-actions button {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #eee;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
            white-space: nowrap;
        }
        body.light .header-actions button {
            background: rgba(0,0,0,0.08);
            border-color: rgba(0,0,0,0.2);
            color: #222;
        }
        .header-actions button:hover { background: rgba(255,255,255,0.25); }
        body.light .header-actions button:hover { background: rgba(0,0,0,0.15); }
        #reset-button { border-color: #ff6b6b !important; color: #ff6b6b !important; }
        body.light #reset-button { border-color: #d63031 !important; color: #d63031 !important; }
        #reset-button:hover { background: rgba(255,107,107,0.2) !important; }

        footer { margin-top: auto; justify-content: center; text-align: center; font-size: 0.8rem; }
        footer a { color: #4fc3f7; text-decoration: none; }
        body.light footer a { color: #0277bd; }
        footer a:hover { text-decoration: underline; }

        #tournament {
            display: flex;
            overflow-x: auto;
            padding: 1rem 0.5rem;
            gap: 0.6rem;
            flex: 1;
            align-items: center;
            background: rgba(0,0,0,0.15);
        }
        body.light #tournament { background: rgba(0,0,0,0.02); }

        .round-column {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            padding: 0.4rem 0.2rem;
            min-width: 56px;
            align-items: center;
        }
        body.light .round-column { background: rgba(0,0,0,0.03); }
        .round-column .round-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
            white-space: nowrap;
        }
        .match {
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            padding: 0.15rem 0.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.05rem;
            width: 100%;
            min-width: 40px;
            border-left: 2px solid transparent;
            transition: border-color 0.2s;
        }
        body.light .match { background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .match.has-winner { border-left-color: #ffd700; }
        .team {
            padding: 0.05rem 0.1rem;
            border-radius: 3px;
            cursor: default;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.6rem;
            min-height: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.15s, opacity 0.2s, transform 0.15s;
        }
        .team:not(.winner):not(.loser):hover {
            background: rgba(255,255,255,0.15);
            cursor: pointer;
        }
        body.light .team:not(.winner):not(.loser):hover { background: rgba(0,0,0,0.06); }
        .team.winner {
            background: #ffd700;
            border-radius: 4px;
            box-shadow: 0 0 6px rgba(255,215,0,0.5);
            transform: scale(1.05);
        }
        .team.loser { opacity: 0.25; filter: grayscale(0.8); }
        .team.tbd { opacity: 0.3; font-size: 0.8rem; color: #aaa; }
        .match-info {
            font-size: 0.4rem;
            text-align: center;
            opacity: 0.35;
            white-space: nowrap;
            margin-top: 0.05rem;
        }
        .center-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 0 0.2rem;
        }
        .center-divider .final-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }

        @media (max-width: 700px) {
            .team { font-size: 1rem; line-height: 1.3rem; min-height: 1.3rem; }
            .round-column { min-width: 40px; padding: 0.2rem 0.1rem; }
            .match { min-width: 30px; padding: 0.1rem 0.05rem; }
            .match-info { font-size: 0.35rem; }
            .round-column .round-label { font-size: 0.45rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ World Cup 2026</h1>
        <div class="header-actions">
            <button id="reset-button">🔄 Reset</button>
            <button id="theme-toggle">Light Mode</button>
        </div>
    </header>

    <main id="tournament"></main>

    <footer>
        <p>Contact us<br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></p>
    </footer>

    <script>
        // ================================================================
        // 1. TEAM DATA
        // ================================================================
        const TEAMS = [
            { name: 'South Africa', flag: '🇿🇦' },
            { name: 'Canada', flag: '🇨🇦' },
            { name: 'Germany', flag: '🇩🇪' },
            { name: 'Paraguay', flag: '🇵🇾' },
            { name: 'Netherlands', flag: '🇳🇱' },
            { name: 'Morocco', flag: '🇲🇦' },
            { name: 'Brazil', flag: '🇧🇷' },
            { name: 'Japan', flag: '🇯🇵' },
            { name: 'France', flag: '🇫🇷' },
            { name: 'Sweden', flag: '🇸🇪' },
            { name: 'Ivory Coast', flag: '🇨🇮' },
            { name: 'Norway', flag: '🇳🇴' },
            { name: 'Mexico', flag: '🇲🇽' },
            { name: 'Ecuador', flag: '🇪🇨' },
            { name: 'England', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
            { name: 'DR Congo', flag: '🇨🇩' },
            { name: 'USA', flag: '🇺🇸' },
            { name: 'Bosnia and Herzegovina', flag: '🇧🇦' },
            { name: 'Belgium', flag: '🇧🇪' },
            { name: 'Senegal', flag: '🇸🇳' },
            { name: 'Portugal', flag: '🇵🇹' },
            { name: 'Croatia', flag: '🇭🇷' },
            { name: 'Spain', flag: '🇪🇸' },
            { name: 'Austria', flag: '🇦🇹' },
            { name: 'Switzerland', flag: '🇨🇭' },
            { name: 'Algeria', flag: '🇩🇿' },
            { name: 'Argentina', flag: '🇦🇷' },
            { name: 'Cape Verde', flag: '🇨🇻' },
            { name: 'Colombia', flag: '🇨🇴' },
            { name: 'Ghana', flag: '🇬🇭' },
            { name: 'Australia', flag: '🇦🇺' },
            { name: 'Egypt', flag: '🇪🇬' }
        ];
        function getTeam(name) { return TEAMS.find(t => t.name === name); }

        // ================================================================
        // 2. TOURNAMENT DATA
        // ================================================================
        const R32_DATA = [
            { home: 'South Africa', away: 'Canada', date: 'Jun 28, 3:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { home: 'Germany', away: 'Paraguay', date: 'Jun 29, 4:30 PM', stadium: 'Gillette Stadium, Foxborough' },
            { home: 'Netherlands', away: 'Morocco', date: 'Jun 29, 9:00 PM', stadium: 'Estadio BBVA, Guadalupe' },
            { home: 'Brazil', away: 'Japan', date: 'Jun 29, 1:00 PM', stadium: 'NRG Stadium, Houston' },
            { home: 'France', away: 'Sweden', date: 'Jun 30, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { home: 'Ivory Coast', away: 'Norway', date: 'Jun 30, 1:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { home: 'Mexico', away: 'Ecuador', date: 'Jun 30, 9:00 PM', stadium: 'Estadio Azteca, Mexico City' },
            { home: 'England', away: 'DR Congo', date: 'Jul 1, 12:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' },
            { home: 'USA', away: 'Bosnia and Herzegovina', date: 'Jul 1, 8:00 PM', stadium: "Levi's Stadium, Santa Clara" },
            { home: 'Belgium', away: 'Senegal', date: 'Jul 1, 4:00 PM', stadium: 'Lumen Field, Seattle' },
            { home: 'Portugal', away: 'Croatia', date: 'Jul 2, 7:00 PM', stadium: 'BMO Field, Toronto' },
            { home: 'Spain', away: 'Austria', date: 'Jul 2, 3:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { home: 'Switzerland', away: 'Algeria', date: 'Jul 2, 11:00 PM', stadium: 'BC Place, Vancouver' },
            { home: 'Argentina', away: 'Cape Verde', date: 'Jul 3, 6:00 PM', stadium: 'Hard Rock Stadium, Miami Gardens' },
            { home: 'Colombia', away: 'Ghana', date: 'Jul 3, 9:30 PM', stadium: 'Arrowhead Stadium, Kansas City' },
            { home: 'Australia', away: 'Egypt', date: 'Jul 3, 2:00 PM', stadium: 'AT&T Stadium, Arlington' }
        ];

        const R16_SOURCES = [
            [0, 2], [1, 4], [3, 5], [6, 7],
            [10, 11], [8, 9], [13, 15], [12, 14]
        ];
        const R16_SCHEDULE = [
            { date: 'Jul 4, 1:00 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jul 4, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jul 5, 4:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { date: 'Jul 5, 8:00 PM', stadium: 'NRG Stadium, Houston' },
            { date: 'Jul 6, 3:00 PM', stadium: "Levi's Stadium, Santa Clara" },
            { date: 'Jul 6, 8:00 PM', stadium: 'Lumen Field, Seattle' },
            { date: 'Jul 7, 12:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' },
            { date: 'Jul 7, 4:00 PM', stadium: 'Estadio Azteca, Mexico City' }
        ];

        const QF_SOURCES = [
            [0, 1], [4, 5], [2, 3], [6, 7]
        ];
        const QF_SCHEDULE = [
            { date: 'Jul 9, 4:00 PM', stadium: 'Gillette Stadium, Foxborough' },
            { date: 'Jul 10, 3:00 PM', stadium: 'SoFi Stadium, Los Angeles' },
            { date: 'Jul 11, 5:00 PM', stadium: 'MetLife Stadium, East Rutherford' },
            { date: 'Jul 11, 9:00 PM', stadium: 'NRG Stadium, Houston' }
        ];

        const SF_SOURCES = [
            [0, 1], [2, 3]
        ];
        const SF_SCHEDULE = [
            { date: 'Jul 14, 3:00 PM', stadium: 'AT&T Stadium, Arlington' },
            { date: 'Jul 15, 3:00 PM', stadium: 'Mercedes-Benz Stadium, Atlanta' }
        ];

        const THIRD_PLACE = { date: 'Jul 18, 5:00 PM', stadium: 'Hard Rock Stadium, Miami Gardens' };
        const FINAL = { date: 'Jul 19, 3:00 PM', stadium: 'MetLife Stadium, East Rutherford' };

        // ================================================================
        // 3. BUILD TOURNAMENT STATE
        // ================================================================
        let tournament = null;

        function buildTournament() {
            const rounds = [
                { name: 'R32', matches: [] },
                { name: 'R16', matches: [] },
                { name: 'QF', matches: [] },
                { name: 'SF', matches: [] },
                { name: '3rd', matches: [] },
                { name: 'Final', matches: [] }
            ];
            for (let i = 0; i < 16; i++) {
                const d = R32_DATA[i];
                rounds[0].matches.push({
                    id: `r32_${i}`,
                    home: getTeam(d.home),
                    away: getTeam(d.away),
                    winner: null,
                    date: d.date,
                    stadium: d.stadium,
                    roundIdx: 0,
                    matchIdx: i
                });
            }
            for (let i = 0; i < 8; i++) {
                rounds[1].matches.push({
                    id: `r16_${i}`,
                    home: null, away: null, winner: null,
                    date: R16_SCHEDULE[i].date,
                    stadium: R16_SCHEDULE[i].stadium,
                    roundIdx: 1,
                    matchIdx: i,
                    sources: R16_SOURCES[i]
                });
            }
            for (let i = 0; i < 4; i++) {
                rounds[2].matches.push({
                    id: `qf_${i}`,
                    home: null, away: null, winner: null,
                    date: QF_SCHEDULE[i].date,
                    stadium: QF_SCHEDULE[i].stadium,
                    roundIdx: 2,
                    matchIdx: i,
                    sources: QF_SOURCES[i]
                });
            }
            for (let i = 0; i < 2; i++) {
                rounds[3].matches.push({
                    id: `sf_${i}`,
                    home: null, away: null, winner: null,
                    date: SF_SCHEDULE[i].date,
                    stadium: SF_SCHEDULE[i].stadium,
                    roundIdx: 3,
                    matchIdx: i,
                    sources: SF_SOURCES[i]
                });
            }
            rounds[4].matches.push({
                id: 'third',
                home: null, away: null, winner: null,
                date: THIRD_PLACE.date,
                stadium: THIRD_PLACE.stadium,
                roundIdx: 4,
                matchIdx: 0,
                sources: null
            });
            rounds[5].matches.push({
                id: 'final',
                home: null, away: null, winner: null,
                date: FINAL.date,
                stadium: FINAL.stadium,
                roundIdx: 5,
                matchIdx: 0,
                sources: null
            });
            return rounds;
        }

        // ================================================================
        // 4. SAVE / LOAD
        // ================================================================
        function saveState() {
            try { localStorage.setItem('wc2026_bracket', JSON.stringify(tournament)); }
            catch(e) { console.warn('Save failed', e); }
        }
        function loadState() {
            const stored = localStorage.getItem('wc2026_bracket');
            if (!stored) return null;
            try {
                const parsed = JSON.parse(stored);
                for (let r = 0; r < parsed.length; r++) {
                    for (let m = 0; m < parsed[r].matches.length; m++) {
                        const match = parsed[r].matches[m];
                        if (match.home && match.home.name) match.home = getTeam(match.home.name);
                        if (match.away && match.away.name) match.away = getTeam(match.away.name);
                        if (match.winner && match.winner.name) match.winner = getTeam(match.winner.name);
                    }
                }
                return parsed;
            } catch(e) { console.warn('Load failed', e); return null; }
        }
        function resetState() {
            localStorage.removeItem('wc2026_bracket');
            tournament = buildTournament();
            renderTournament();
            saveState();
        }

        // ================================================================
        // 5. RENDER – LEFT HALF | CENTER | RIGHT HALF
        // ================================================================
        function renderTournament() {
            const container = document.getElementById('tournament');
            container.innerHTML = '';

            // Helper: build a column from an array of matches
            function buildColumn(label, matches, extraStyle = '') {
                const col = document.createElement('div');
                col.className = 'round-column';
                if (extraStyle) col.style.cssText += extraStyle;
                const lbl = document.createElement('div');
                lbl.className = 'round-label';
                lbl.textContent = label;
                col.appendChild(lbl);
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'match';
                    if (match.winner) div.classList.add('has-winner');

                    const home = document.createElement('div');
                    home.className = 'team home';
                    if (match.home) {
                        home.textContent = match.home.flag;
                        if (match.winner === match.home) home.classList.add('winner');
                        else if (match.winner) home.classList.add('loser');
                        if (!match.winner && match.home && match.away) {
                            home.style.cursor = 'pointer';
                            home.addEventListener('click', () => selectWinner(match.roundIdx, match.matchIdx, 'home'));
                        }
                    } else {
                        home.textContent = '?';
                        home.classList.add('tbd');
                    }

                    const away = document.createElement('div');
                    away.className = 'team away';
                    if (match.away) {
                        away.textContent = match.away.flag;
                        if (match.winner === match.away) away.classList.add('winner');
                        else if (match.winner) away.classList.add('loser');
                        if (!match.winner && match.home && match.away) {
                            away.style.cursor = 'pointer';
                            away.addEventListener('click', () => selectWinner(match.roundIdx, match.matchIdx, 'away'));
                        }
                    } else {
                        away.textContent = '?';
                        away.classList.add('tbd');
                    }

                    const info = document.createElement('div');
                    info.className = 'match-info';
                    info.textContent = `${match.date} | ${match.stadium}`;

                    div.appendChild(home);
                    div.appendChild(away);
                    div.appendChild(info);
                    col.appendChild(div);
                });
                return col;
            }

            const r32 = tournament[0].matches;
            const r16 = tournament[1].matches;
            const qf  = tournament[2].matches;
            const sf  = tournament[3].matches;
            const third = tournament[4].matches[0];
            const final = tournament[5].matches[0];

            // Split each round into left and right halves
            const leftR32 = r32.slice(0, 8);
            const leftR16 = r16.slice(0, 4);
            const leftQF  = qf.slice(0, 2);
            const leftSF  = sf.slice(0, 1);

            const rightR32 = r32.slice(8, 16);
            const rightR16 = r16.slice(4, 8);
            const rightQF  = qf.slice(2, 4);
            const rightSF  = sf.slice(1, 2);

            // --- LEFT SIDE (outer → inner) ---
            container.appendChild(buildColumn('R32', leftR32));
            container.appendChild(buildColumn('R16', leftR16));
            container.appendChild(buildColumn('QF', leftQF));
            container.appendChild(buildColumn('SF', leftSF));

            // --- CENTER (Final & Third) ---
            const center = document.createElement('div');
            center.className = 'center-divider';
            // Final
            const finalCol = buildColumn('Final', [final]);
            finalCol.style.background = 'rgba(255,215,0,0.08)';
            finalCol.style.border = '1px solid rgba(255,215,0,0.3)';
            finalCol.style.borderRadius = '8px';
            finalCol.style.padding = '0.4rem 0.3rem';
            center.appendChild(finalCol);
            // spacer
            const sp = document.createElement('div');
            sp.style.height = '0.6rem';
            center.appendChild(sp);
            // Third
            const thirdCol = buildColumn('3rd', [third]);
            thirdCol.style.background = 'rgba(192,192,192,0.06)';
            thirdCol.style.border = '1px solid rgba(192,192,192,0.2)';
            thirdCol.style.borderRadius = '8px';
            thirdCol.style.padding = '0.4rem 0.3rem';
            center.appendChild(thirdCol);
            container.appendChild(center);

            // --- RIGHT SIDE (inner → outer) ---
            container.appendChild(buildColumn('SF', rightSF));
            container.appendChild(buildColumn('QF', rightQF));
            container.appendChild(buildColumn('R16', rightR16));
            container.appendChild(buildColumn('R32', rightR32));

            // After render, save if not already saved (but we save after each selection)
        }

        // ================================================================
        // 6. SELECT WINNER & PROPAGATE
        // ================================================================
        function selectWinner(roundIdx, matchIdx, side) {
            const match = tournament[roundIdx].matches[matchIdx];
            if (match.winner) return;

            const winner = side === 'home' ? match.home : match.away;
            if (!winner) return;

            match.winner = winner;

            if (roundIdx === 0) {
                // R32 → R16
                const r16 = tournament[1];
                for (let i = 0; i < r16.matches.length; i++) {
                    const m = r16.matches[i];
                    if (!m.sources) continue;
                    if (m.sources[0] === matchIdx) m.home = winner;
                    if (m.sources[1] === matchIdx) m.away = winner;
                }
            } else if (roundIdx === 1) {
                // R16 → QF
                const qf = tournament[2];
                for (let i = 0; i < qf.matches.length; i++) {
                    const m = qf.matches[i];
                    if (!m.sources) continue;
                    if (m.sources[0] === matchIdx) m.home = winner;
                    if (m.sources[1] === matchIdx) m.away = winner;
                }
            } else if (roundIdx === 2) {
                // QF → SF
                const sf = tournament[3];
                for (let i = 0; i < sf.matches.length; i++) {
                    const m = sf.matches[i];
                    if (!m.sources) continue;
                    if (m.sources[0] === matchIdx) m.home = winner;
                    if (m.sources[1] === matchIdx) m.away = winner;
                }
            } else if (roundIdx === 3) {
                // SF → Final & Third
                const finalMatch = tournament[5].matches[0];
                const thirdMatch = tournament[4].matches[0];
                if (matchIdx === 0) {
                    finalMatch.home = winner;
                    const loser = side === 'home' ? match.away : match.home;
                    thirdMatch.home = loser;
                } else {
                    finalMatch.away = winner;
                    const loser = side === 'home' ? match.away : match.home;
                    thirdMatch.away = loser;
                }
            } else if (roundIdx === 4) {
                setTimeout(() => alert(`🥉 Third Place: ${winner.flag} ${winner.name} 🥉`), 100);
            } else if (roundIdx === 5) {
                setTimeout(() => alert(`🏆 Champion: ${winner.flag} ${winner.name} 🏆`), 100);
            }

            renderTournament();
            saveState();
        }

        // ================================================================
        // 7. THEME TOGGLE
        // ================================================================
        document.getElementById('theme-toggle').addEventListener('click', function() {
            document.body.classList.toggle('light');
            this.textContent = document.body.classList.contains('light') ? 'Dark Mode' : 'Light Mode';
        });

        // ================================================================
        // 8. INIT
        // ================================================================
        const saved = loadState();
        tournament = saved || buildTournament();
        renderTournament();

        document.getElementById('reset-button').addEventListener('click', function() {
            if (confirm('Reset all progress?')) resetState();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
